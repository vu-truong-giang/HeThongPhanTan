syntax = "proto3";

service StudentService {
    rpc Login(LoginRequest) returns (LoginResponse);
    rpc getScore(ScoreRequest) returns (ScoreResponse);
}

message LoginRequest {
    string username = 1;
    string password = 2;
}

message LoginResponse {
    string token = 1;
}

message ScoreRequest {
    int32 id = 1;
}

message ScoreResponse {
    int32 id = 1;
    string name = 2;
    int32 score = 3;
}