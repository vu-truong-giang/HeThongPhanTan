version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    hostname: rabbit-host
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin

  producer:
    build: .
    depends_on:
      - rabbitmq
    command: python producer.py

  consumer:
    build: .
    depends_on:
      - rabbitmq
    command: python consumer.py